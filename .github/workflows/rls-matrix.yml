name: RLS matrix

# Runs the RLS access matrices (every-table + per-role) and the coverage
# report on every pull request to `main`. Mark the **"RLS matrix"** check
# as required in GitHub branch protection so any RLS regression blocks merge.
#
# Also runs on pushes to `main` and on direct changes to migrations / RLS
# tests / this workflow. Nightly run is covered by `security-audit.yml`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "e2e/rls-matrix.test.ts"
      - "e2e/rls-role-matrix.test.ts"
      - "e2e/helpers.ts"
      - "scripts/rls-coverage-report.ts"
      - ".github/workflows/rls-matrix.yml"
  workflow_dispatch:

concurrency:
  group: rls-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rls-matrix:
    name: RLS matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run RLS matrix + coverage report
        # Exits non-zero on any failed assertion → fails the required check.
        run: bun run test:rls-coverage
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          E2E_OPERATOR_EMAIL: ${{ secrets.E2E_OPERATOR_EMAIL }}
          E2E_OPERATOR_PASSWORD: ${{ secrets.E2E_OPERATOR_PASSWORD }}
          E2E_OPERATOR_ONLY_EMAIL: ${{ secrets.E2E_OPERATOR_ONLY_EMAIL }}
          E2E_OPERATOR_ONLY_PASSWORD: ${{ secrets.E2E_OPERATOR_ONLY_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rls-coverage-report
          path: reports/rls-coverage.md
          if-no-files-found: ignore

      - name: Post coverage to PR summary
        if: always()
        run: |
          if [ -f reports/rls-coverage.md ]; then
            {
              echo "## RLS matrix coverage"
              echo ""
              cat reports/rls-coverage.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi
