name: Security audit

# Runs the Supabase linter + role-based smoke checks whenever a migration
# changes, on a manual dispatch, and nightly. Uses GitHub Environment secrets:
#   E2E_SUPABASE_URL, E2E_SUPABASE_ANON_KEY,
#   E2E_OPERATOR_EMAIL, E2E_OPERATOR_PASSWORD,
#   SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF
on:
  pull_request:
    # Run on every PR so the job appears as a required status check.
    # Mark "Linter + RLS matrix" required in branch protection to block merges.
    branches: [main]
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "e2e/security-audit.test.ts"
      - "e2e/rls-matrix.test.ts"
      - ".github/workflows/security-audit.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *" # 03:17 UTC nightly

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Linter + RLS matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security suite
        run: bun run test:security
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          E2E_OPERATOR_EMAIL: ${{ secrets.E2E_OPERATOR_EMAIL }}
          E2E_OPERATOR_PASSWORD: ${{ secrets.E2E_OPERATOR_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
