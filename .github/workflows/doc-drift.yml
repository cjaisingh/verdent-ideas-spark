name: Doc Drift

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "29 4 * * 1" # Mondays 04:29 UTC — weekly drift sweep against main
  workflow_dispatch:

concurrency:
  group: doc-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: Check docs and changelog parity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'doc-drift-ok') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run doc-drift check
        env:
          GITHUB_BASE_REF: ${{ github.base_ref || 'main' }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bun run scripts/check-doc-drift.ts

      - name: Verify sub-processor list is in sync
        run: bun run subprocessors:check
