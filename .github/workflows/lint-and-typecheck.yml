name: Lint & Typecheck

# Lightweight, fast feedback gate that runs on every push/PR independently
# of the full ci.yml (which also runs tests + build). Mark this required
# in branch protection for the fastest signal.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: lint-typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: no-explicit-any ratchet
        run: bun run lint:ratchet

      - name: Typecheck
        run: bunx tsc --noEmit
