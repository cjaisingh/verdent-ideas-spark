name: Nightly tests

on:
  schedule:
    # 02:00 UTC daily
    - cron: "0 2 * * *"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Run unit tests
        id: unit
        continue-on-error: true
        run: bunx vitest run --reporter=json --outputFile=unit.json

      - name: Run e2e tests
        id: e2e
        continue-on-error: true
        run: bunx vitest run -c vitest.e2e.config.ts --reporter=json --outputFile=e2e.json

      - name: Report to backend
        if: always()
        env:
          AWIP_SERVICE_TOKEN: ${{ secrets.AWIP_SERVICE_TOKEN }}
          SUPABASE_FUNCTIONS_URL: https://agzkyzyzopcgeobofjaz.supabase.co/functions/v1
        run: |
          set -e
          for suite in unit e2e; do
            file="${suite}.json"
            if [ ! -f "$file" ]; then continue; fi
            total=$(jq '.numTotalTests // 0' "$file")
            passed=$(jq '.numPassedTests // 0' "$file")
            failed=$(jq '.numFailedTests // 0' "$file")
            skipped=$(jq '.numPendingTests // 0' "$file")
            duration=$(jq '((.testResults // []) | map(.endTime - .startTime) | add) // 0' "$file")
            status=$([ "$failed" -eq 0 ] && echo passed || echo failed)
            curl -fsS -X POST "$SUPABASE_FUNCTIONS_URL/record-test-run" \
              -H "Content-Type: application/json" \
              -H "x-service-token: $AWIP_SERVICE_TOKEN" \
              -d "{\"suite\":\"$suite\",\"status\":\"$status\",\"total\":$total,\"passed\":$passed,\"failed\":$failed,\"skipped\":$skipped,\"duration_ms\":$duration,\"commit_sha\":\"${{ github.sha }}\",\"branch\":\"${{ github.ref_name }}\",\"workflow_run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          done

      - name: Fail job if any suite failed
        if: steps.unit.outcome == 'failure' || steps.e2e.outcome == 'failure'
        run: exit 1
