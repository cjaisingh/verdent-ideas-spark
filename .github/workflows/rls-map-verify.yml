name: RLS map verify

# Regenerates e2e/rls-policy-map.generated.ts from the live database and
# fails the PR if the committed file drifts. Mark **"RLS map verify"** as a
# required status check so RLS migrations must include the regenerated map.

on:
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "e2e/rls-policy-map.generated.ts"
      - "scripts/generate-rls-map.ts"
      - ".github/workflows/rls-map-verify.yml"
  workflow_dispatch:

concurrency:
  group: rls-map-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify RLS map matches live schema
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate and diff
        run: bun run rls:verify
        env:
          # Standard libpq env vars — set in the staging GitHub Environment.
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          PGSSLMODE: require
